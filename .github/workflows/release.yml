name: tentserv-chat

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Turi ${{ github.ref_name }}"
          body: |
            Download the installer below.

            **macOS User Notice: If a security warning appears during the first launch, please proceed with execution：
            ```
            xattr -cr /Applications/goat-chat.app
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"

          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"

          - platform: windows-latest
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: get pnpm store
        shell: bash
        run: |
          STORE=$(pnpm store path 2>/dev/null || echo "")
          echo "STORE_PATH=$STORE" >> $GITHUB_ENV

      - uses: actions/cache@v4
        if: env.STORE_PATH != ''
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-apple-darwin
            x86_64-apple-darwin

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: https://dev.hiroliang.com
          VITE_WS_BASE_URL: wss://dev.hiroliang.com/ws/
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Turi ${{ github.ref_name }}"
          releaseBody: ""
          args: ${{ matrix.args }}

      - name: package windows zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $zipName = $exe.BaseName + ".zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: upload windows zip to release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}